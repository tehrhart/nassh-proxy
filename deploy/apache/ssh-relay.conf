# /etc/apache2/sites-available/ssh-relay.conf
#
# Requires: mod_proxy mod_proxy_http mod_proxy_wstunnel mod_headers mod_rewrite mod_ssl

<VirtualHost *:80>
    ServerName ssh-relay.example.com
    Redirect permanent / https://ssh-relay.example.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName ssh-relay.example.com

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/ssh-relay.example.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/ssh-relay.example.com/privkey.pem

    ProxyRequests       Off
    ProxyPreserveHost   On
    ProxyTimeout        86400

    # Route WebSocket upgrades through mod_proxy_wstunnel; normal HTTP falls through.
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule ^/(.*)$ ws://127.0.0.1:8080/$1 [P,L]

    ProxyPass        / http://127.0.0.1:8080/
    ProxyPassReverse / http://127.0.0.1:8080/

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-For   "%{REMOTE_ADDR}s"
    RequestHeader set X-Real-IP         "%{REMOTE_ADDR}s"

    ErrorLog  ${APACHE_LOG_DIR}/ssh-relay.error.log
    CustomLog ${APACHE_LOG_DIR}/ssh-relay.access.log combined
</VirtualHost>
