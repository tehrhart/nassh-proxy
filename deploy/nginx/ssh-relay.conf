# /etc/nginx/sites-available/ssh-relay.conf
#
# Terminate TLS, forward WebSocket upgrade + HTTP to the relay on 127.0.0.1:8080.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ssh-relay.example.com;

    ssl_certificate     /etc/letsencrypt/live/ssh-relay.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ssh-relay.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:ssh_relay:10m;

    access_log /var/log/nginx/ssh-relay.access.log;
    error_log  /var/log/nginx/ssh-relay.error.log;

    # Keep the health probe local so you don't depend on the LB/upstream path.
    location = /healthz {
        proxy_pass http://127.0.0.1:8080/healthz;
        proxy_http_version 1.1;
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSH sessions sit idle. Raise from the 60s default.
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;

        # Full-duplex stream. Don't buffer.
        proxy_buffering         off;
        proxy_request_buffering off;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name ssh-relay.example.com;
    return 301 https://$host$request_uri;
}
